services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "${WEB_PORT:-8080}:80"
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV: production
      API_PORT: 3000
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:8080}
      DATABASE_URL: postgresql://${POSTGRES_USER:-filevault}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@database:5432/${POSTGRES_DB:-filevault}
      FILEVAULT_ADMIN_EMAIL: ${FILEVAULT_ADMIN_EMAIL:?Set FILEVAULT_ADMIN_EMAIL in .env}
      FILEVAULT_ADMIN_PASSWORD: ${FILEVAULT_ADMIN_PASSWORD:?Set FILEVAULT_ADMIN_PASSWORD in .env}
      FILEVAULT_STORAGE_PATH: /data/files
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-1000}
      SESSION_SECRET: ${SESSION_SECRET:?Set SESSION_SECRET in .env}
      SESSION_TTL_HOURS: ${SESSION_TTL_HOURS:-24}
    depends_on:
      database:
        condition: service_healthy
    expose:
      - "3000"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:3000/api/v1/health').then(response=>{if(!response.ok)process.exit(1)}).catch(()=>process.exit(1))
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    volumes:
      - ${FILEVAULT_DATA_PATH:-./storage}:/data/files

  database:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-filevault}
      POSTGRES_USER: ${POSTGRES_USER:-filevault}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
